<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#1a2e1a;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;padding:44px 40px;border-radius:18px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
h2{font-family:'Playfair Display',serif;color:#1a2e1a;margin-bottom:4px}
h2 span{color:#7a9e68;font-style:italic}
.sub{color:#aaa;font-size:.8rem;margin-bottom:28px}
.err{background:#fef0eb;color:#c4622d;padding:10px;border-radius:8px;font-size:.8rem;margin-bottom:16px;display:none}
.err.show{display:block}
label{display:block;text-align:left;font-size:.72rem;font-weight:500;color:#3d5c2e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input{width:100%;padding:12px 14px;border:1.5px solid #e8dcc8;border-radius:10px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;background:#f5f0e8;margin-bottom:18px;box-sizing:border-box}
input:focus{border-color:#3d5c2e;background:#fff}
button{width:100%;background:#1a2e1a;color:#d4a847;border:none;padding:14px;border-radius:10px;font-size:.9rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer}
button:hover{background:#3d5c2e}
</style>
</head>
<body>
<div class="card">
  <h2 id="brand-name">CultureQuest</h2>
  <div class="sub">Admin — Restricted Access</div>
  <div class="err" id="err-box">Wrong password. Try again.</div>
  <form method="POST" action="/api/admin-login">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter admin password" autofocus/>
    <button type="submit">Login</button>
  </form>
</div>
<script>
  // Load config with cache-bust so changes always apply immediately
  const s = document.createElement('script');
  s.src = '/static/app.config.js?v=' + Date.now();
  s.onload = function() {
    const cfg    = (typeof APP_CONFIG !== 'undefined') ? APP_CONFIG : {};
    const name   = cfg.APP_NAME        || "CultureQuest";
    const suffix = cfg.APP_NAME_SUFFIX || "Quest";
    const prefix = name.replace(suffix, "");
    document.getElementById('brand-name').innerHTML = prefix + '<span>' + suffix + '</span>';
    document.title = name + ' — Admin';
  };
  s.onerror = function() {
    // Config file missing — use hardcoded fallback, still looks fine
    document.getElementById('brand-name').innerHTML = 'Culture<span>Quest</span>';
    document.title = 'CultureQuest — Admin';
  };
  document.head.appendChild(s);

  // Show error if ?error=1
  if (new URLSearchParams(window.location.search).get('error')) {
    document.getElementById('err-box').classList.add('show');
  }
</script>
</body>
</html>
